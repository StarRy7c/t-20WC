<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crixzy - Live Stream & Movies</title>

<meta name="description" content="Watch live streams and movies on Crixzy">
<meta property="og:title" content="Crixzy - Live Stream & Movies">
<meta property="og:description" content="Join us to watch amazing content!">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:#000;
    color:#fff;
}
.container{
    max-width:1400px;
    margin:auto;
    padding:10px 15px;
}
.alert-banner{
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:8px;
    text-align:center;
    font-weight:600;
    font-size:14px;
}
.player-container{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}
.player-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}
.share-section{
    text-align:center;
    margin:15px 0;
}
.share-buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.share-btn{
    padding:10px 18px;
    font-size:14px;
    font-weight:600;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}
.share-btn:hover{
    transform:translateY(-2px);
}
.btn-whatsapp{background:#25D366}
.btn-telegram{background:#0088cc}
.btn-copy{background:#6c757d}
.telegram-join{
    text-align:center;
    margin:10px 0;
}
.telegram-join a{
    background:#0088cc;
    padding:10px 25px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    color:#fff;
}
.search-section{
    margin-top:20px;
    padding:15px;
    background:#1a1a1a;
    border-radius:8px;
    text-align:center;
}
.search-btn{
    padding:12px;
    width:100%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    border:none;
    color:#fff;
    font-size:15px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}
.footer{
    margin-top:20px;
    padding:10px;
    text-align:center;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="alert-banner">
🎬 Share The Links With Your Friends & Enjoy Together! 🎉
</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-container">
        <!-- CHANGE STREAM URL BELOW -->
        <iframe id="contentFrame"
        src="https://allrounderlive.pages.dev/dilz?id=65656576"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen></iframe>
    </div>

    <!-- SHARE SECTION -->
    <div class="share-section">
        <h3>📤 Share This Stream</h3>
        <div class="share-buttons">
            <button class="share-btn btn-whatsapp" onclick="shareWhatsApp()">
                WhatsApp
            </button>
            <button class="share-btn btn-telegram" onclick="shareTelegram()">
                Telegram
            </button>
            <button class="share-btn btn-copy" onclick="copyLink(this)">
                Copy Link
            </button>
        </div>
    </div>

    <!-- TELEGRAM JOIN -->
    <div class="telegram-join">
        <a href="https://t.me/+OACGYQBHrIJmM2Y1" target="_blank">
            🚀 Join Our Telegram Channel
        </a>
    </div>

    <!-- SEARCH SECTION -->
    <div class="search-section">
        <h2>🔍 Search & Watch Any Movie</h2>
        <p style="color:#aaa;margin:10px 0;">
            Discover thousands of movies and shows instantly
        </p>
        <a href="https://starry7c.github.io/search-movie/" target="_blank">
            <button class="search-btn">
                🎬 Search Movies & TV Shows
            </button>
        </a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2024 Crixzy | Made with ❤️ for movie lovers
    </div>

</div>

<script>

const currentURL = window.location.href;
const shareText = "Check out this amazing stream on Crixzy! 🎬";

// WhatsApp
function shareWhatsApp(){
    const url = "https://wa.me/?text=" +
        encodeURIComponent(shareText + " " + currentURL);
    window.open(url,"_blank");
}

// Telegram
function shareTelegram(){
    const url = "https://t.me/share/url?url=" +
        encodeURIComponent(currentURL) +
        "&text=" + encodeURIComponent(shareText);
    window.open(url,"_blank");
}

// Copy
function copyLink(button){
    navigator.clipboard.writeText(currentURL).then(()=>{
        const original = button.innerHTML;
        button.innerHTML = "✅ Copied!";
        button.style.background = "#28a745";
        setTimeout(()=>{
            button.innerHTML = original;
            button.style.background = "#6c757d";
        },2000);
    });
}

// Optional: Telegram auto open once (non blocking)
window.addEventListener("load",()=>{
    setTimeout(()=>{
        window.open("https://t.me/+OACGYQBHrIJmM2Y1","_blank");
    },4000);
});

</script>

</body>
</html>
